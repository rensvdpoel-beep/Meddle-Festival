<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foto’s – Zondag 2023</title>

<style>
body {
  font-family: Aptos, sans-serif;
  margin: 0;
  background: #f6f6f6;
}

/* HEADER */
header {
  background: url('../images/Meddle.jpg') center/cover no-repeat;
  padding: 40px 20px 160px;
  text-align: center;
  position: relative;
  color: white;
}

.header-logo {
  width: 120px;
  position: absolute;
  top: 20px;
  left: 20px;
}

.header-title {
  font-size: 50px;
  margin-top: 40px;
  text-shadow: 0 0 8px rgba(0,0,0,0.7);
}

.subnav {
  margin-top: 25px;
  display: flex;
  justify-content: center;
  gap: 50px;
}

.subnav a {
  color: white;
  font-size: 28px;
  font-weight: bold;
  text-decoration: none;
  text-shadow: 0 0 6px rgba(0,0,0,0.6);
  transition: 0.2s;
}

.subnav a:hover {
  color: #f8d78b;
}

/* SOCIAL BLOCK */
.social-block {
  position: absolute;
  top: 18px;
  right: 22px;
  text-align: right;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 50;
}

.social-top {
  display: flex;
  align-items: center;
  gap: 12px;
  white-space: nowrap;
}

.social-text {
  font-size: 16px;
  font-weight: 700;
  color: white;
  text-shadow: 0 0 6px rgba(0,0,0,0.7);
}

.social-icons-inline img {
  width: 30px;
  height: 30px;
  object-fit: contain;
  filter: drop-shadow(0 0 4px rgba(0,0,0,0.6));
  transition: transform .15s ease;
}

.social-icons-inline a:hover img {
  transform: scale(1.12);
}

.social-bottom {
  display: flex;
  justify-content: flex-end;
}

.contact-btn {
  display: inline-block;
  padding: 8px 14px;
  background: rgba(255,255,255,0.95);
  color: #111;
  text-decoration: none;
  font-weight: 700;
  border-radius: 8px;
  font-size: 14px;
}

/* MAIN */
main {
  max-width: 1200px;
  margin: 40px auto;
  padding: 40px;
  background: white;
  border-radius: 12px;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
}

.gallery img {
  width: 100%;
  height: 220px;
  object-fit: contain;   /* 👈 dit is de magic */
  background: #000;      /* optioneel: zwarte achtergrond */
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}


.gallery img:hover {
  transform: scale(1.05);
}

/* LIGHTBOX */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.95);
  z-index: 999;
  align-items: center;
  justify-content: center;
}

.lightbox img {
  max-width: 90%;
  max-height: 80%;
  border-radius: 10px;
}

/* Zorg dat de foto normaal kan zoomen op mobiel */
.lightbox img {
  touch-action: manipulation;
}

/* Alleen mobiel: swipe verbeteren */
@media (max-width: 820px) {
  .lightbox {
    touch-action: pan-y;
  }
}


/* NAVIGATION */
.nav-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  border: none;
  color: white;
  font-size: 40px;
  padding: 20px 25px;
  cursor: pointer;
  border-radius: 50%;
  transition: 0.2s;
}

.nav-btn:hover {
  background: rgba(0,0,0,0.8);
}

.nav-btn.left { left: 20px; }
.nav-btn.right { right: 20px; }

/* BOTTOM BAR */
.bottom-bar {
  position: absolute;
  bottom: 20px;
  display: flex;
  align-items: center;
  gap: 20px;
  background: rgba(0,0,0,0.6);
  padding: 12px 20px;
  border-radius: 30px;
  color: white;
}

.download-btn, .close-btn {
  background: white;
  border: none;
  padding: 8px 14px;
  border-radius: 20px;
  font-weight: bold;
  cursor: pointer;
}

#counter {
  font-size: 16px;
}

/* 📱 MOBILE FIXES */
@media (max-width: 820px) {

  /* Header compacter */
  header {
    padding: 20px 20px 120px;
  }

  /* Logo kleiner */
  .header-logo {
    width: 80px;
    top: 15px;
    left: 15px;
  }

  /* Titel kleiner en lager */
  .header-title {
    font-size: 32px;
    margin-top: 80px;
  }

  /* Subnav netjes centreren + wrappen */
  .subnav {
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
  }

  .subnav a {
    font-size: 20px;
  }

  /* Social block compacter */
  .social-block {
    right: 10px;
    top: 10px;
    gap: 6px;
  }

  .social-text {
    font-size: 12px;
  }

  .social-icons-inline img {
    width: 22px;
    height: 22px;
  }

  .contact-btn {
    padding: 5px 8px;
    font-size: 12px;
  }

  /* Main iets compacter */
  main {
    padding: 20px;
  }

  /* Gallery netjes onder elkaar */
  .gallery {
    grid-template-columns: 1fr;
  }

  .gallery img {
    height: auto;
  }

  /* Lightbox knoppen kleiner */
  .nav-btn {
    font-size: 30px;
    padding: 15px 18px;
  }
  .nav-btn,
.download-btn,
.close-btn {
  touch-action: manipulation;
}


  .bottom-bar {
    bottom: 10px;
    gap: 10px;
    padding: 8px 12px;
  }

  .download-btn, .close-btn {
    padding: 6px 10px;
    font-size: 14px;
  }
}
</style>
</head>

<body>

<header>
<img src="../images/MF_logo26-WIT.png" class="header-logo">
<h1 class="header-title">Foto’s – Zondag 2023</h1>

<nav class="subnav">
<a href="https://www.meddlefestival.nl">Home</a>
<a href="OverMeddleFestival.html">Over Meddle Festival</a>
<a href="Foto's.html">Foto's</a>
<a href="Sponsoring.html">Sponsoring</a>
<a href="TimeTable.html">Programma</a>
<a href="Tickets.html" target="_blank">Tickets</a>
</nav>

<div class="social-block">
  <div class="social-top">
    <span class="social-text">Check hier onze socials:</span>
    <span class="social-icons-inline">
      <a href="#" target="_blank"><img src="../images/instagram.png"></a>
      <a href="#" target="_blank"><img src="../images/facebook.png"></a>
      <a href="#" target="_blank"><img src="../images/TikTok.png"></a>
    </span>
  </div>
  <div class="social-bottom">
    <span class="social-text">Neem contact met ons op:</span>
    <a class="contact-btn" href="ContactFestival.html">Contact</a>
  </div>
</div>

</header>

<main>
<h2>Zondag 2023</h2>
<div class="gallery" id="gallery"></div>
</main>

<div class="lightbox" id="lightbox">
  <button class="nav-btn left" onclick="prev()">❮</button>
  <button class="nav-btn right" onclick="next()">❯</button>

  <img id="lightbox-img">

  <div class="bottom-bar">
    <div id="counter"></div>
    <button class="download-btn" onclick="downloadImage()">⬇ Download</button>
    <button class="close-btn" onclick="closeLightbox()">✕</button>
  </div>
</div>

<script>
const totalImages = 173;
const gallery = document.getElementById("gallery");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const counter = document.getElementById("counter");

let index = 0;
let images = [];

// Laad automatisch alle 171 foto's vanaf root
for(let i=1; i<=totalImages; i++){
    const path = `fotos/Zondag2023/Image(${i}).jpg`;
    images.push(path);

    const img = document.createElement("img");
    img.src = path;
    img.onclick = () => openLightbox(i-1);
    gallery.appendChild(img);
}

function openLightbox(i){
  index = i;
  update();
  lightbox.style.display = "flex";
}

function closeLightbox(){
  lightbox.style.display = "none";
}

function update(){
  lightboxImg.src = images[index];
  counter.innerText = (index+1) + " / " + images.length;
}

function next(){
  index = (index + 1) % images.length;
  update();
}

function prev(){
  index = (index - 1 + images.length) % images.length;
  update();
}

function downloadImage(){
  const link = document.createElement("a");
  link.href = images[index];
  link.download = images[index].split("/").pop();
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

document.addEventListener("keydown", e => {
  if(lightbox.style.display !== "flex") return;
  if(e.key === "ArrowRight") next();
  if(e.key === "ArrowLeft") prev();
  if(e.key === "Escape") closeLightbox();
});

// Verbeterde swipe (alleen horizontale swipe, geen pinch conflict)
let startX = 0;
let startY = 0;

lightbox.addEventListener("touchstart", e => {
  if (e.touches.length > 1) return; // pinch = negeren
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

lightbox.addEventListener("touchend", e => {
  if (e.changedTouches.length > 1) return;

  const endX = e.changedTouches[0].clientX;
  const endY = e.changedTouches[0].clientY;

  const diffX = startX - endX;
  const diffY = startY - endY;

  // Alleen horizontale swipe detecteren
  if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 60) {
    if (diffX > 0) next();
    else prev();
  }
});

</script>

</body>
</html>
