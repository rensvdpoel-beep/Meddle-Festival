<style>
body {
  font-family: Aptos, sans-serif;
  margin: 0;
  background: #f6f6f6;
}

/* HEADER */
header {
  background: url('../../images/Meddle.jpg') center/cover no-repeat;
  padding: 40px 20px 160px;
  text-align: center;
  position: relative;
  color: white;
}

.header-logo {
  width: 120px;
  position: absolute;
  top: 20px;
  left: 20px;
}

.header-title {
  font-size: 50px;
  margin-top: 40px;
  text-shadow: 0 0 8px rgba(0,0,0,0.7);
}

.subnav {
  margin-top: 25px;
  display: flex;
  justify-content: center;
  gap: 50px;
}

.subnav a {
  color: white;
  font-size: 28px;
  font-weight: bold;
  text-decoration: none;
  text-shadow: 0 0 6px rgba(0,0,0,0.6);
  transition: 0.2s;
}

.subnav a:hover {
  color: #f8d78b;
}

/* SOCIAL BLOCK */
.social-block {
  position: absolute;
  top: 18px;
  right: 22px;
  text-align: right;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 50;
}

.social-top {
  display: flex;
  align-items: center;
  gap: 12px;
  white-space: nowrap;
}

.social-text {
  font-size: 16px;
  font-weight: 700;
  color: white;
  text-shadow: 0 0 6px rgba(0,0,0,0.7);
}

.social-icons-inline img {
  width: 30px;
  height: 30px;
  object-fit: contain;
  filter: drop-shadow(0 0 4px rgba(0,0,0,0.6));
  transition: transform .15s ease;
}

.social-icons-inline a:hover img {
  transform: scale(1.12);
}

.social-bottom {
  display: flex;
  justify-content: flex-end;
}

.contact-btn {
  display: inline-block;
  padding: 8px 14px;
  background: rgba(255,255,255,0.95);
  color: #111;
  text-decoration: none;
  font-weight: 700;
  border-radius: 8px;
  font-size: 14px;
}

/* MAIN */
main {
  max-width: 1200px;
  margin: 40px auto;
  padding: 40px;
  background: white;
  border-radius: 12px;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
}

.gallery img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.gallery img:hover {
  transform: scale(1.05);
}

/* LIGHTBOX */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.95);
  z-index: 999;
  align-items: center;
  justify-content: center;
}

.lightbox img {
  max-width: 90%;
  max-height: 80%;
  border-radius: 10px;
}

/* NAVIGATION */
.nav-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  border: none;
  color: white;
  font-size: 40px;
  padding: 20px 25px;
  cursor: pointer;
  border-radius: 50%;
  transition: 0.2s;
}

.nav-btn:hover {
  background: rgba(0,0,0,0.8);
}

.nav-btn.left { left: 20px; }
.nav-btn.right { right: 20px; }

/* BOTTOM BAR */
.bottom-bar {
  position: absolute;
  bottom: 20px;
  display: flex;
  align-items: center;
  gap: 20px;
  background: rgba(0,0,0,0.6);
  padding: 12px 20px;
  border-radius: 30px;
  color: white;
}

.download-btn, .close-btn {
  background: white;
  border: none;
  padding: 8px 14px;
  border-radius: 20px;
  font-weight: bold;
  cursor: pointer;
}

#counter {
  font-size: 16px;
}

/* MOBILE */
@media (max-width: 820px) {

  .header-title { font-size: 32px; margin-top: 80px; }
  .header-logo { width: 80px; }

  main { padding: 20px; }

  .lightbox img {
    max-width: 95%;
    max-height: 70%;
  }

  .nav-btn {
    font-size: 30px;
    padding: 15px 18px;
  }

  .bottom-bar {
    bottom: 10px;
    gap: 10px;
    padding: 8px 12px;
  }

  .download-btn, .close-btn {
    padding: 6px 10px;
    font-size: 14px;
  }
}
</style>

function openLightbox(i){
  index = i;
  update();
  lightbox.style.display = "flex";
}

function closeLightbox(){
  lightbox.style.display = "none";
}

function update(){
  lightboxImg.src = images[index];
  counter.innerText = (index+1) + " / " + images.length;
}

function next(){
  index = (index + 1) % images.length;
  update();
}

function prev(){
  index = (index - 1 + images.length) % images.length;
  update();
}

/* DOWNLOAD */
function downloadImage(){
  const link = document.createElement("a");
  link.href = images[index];
  link.download = images[index].split("/").pop();
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

/* KEYBOARD */
document.addEventListener("keydown", e => {
  if(lightbox.style.display !== "flex") return;
  if(e.key === "ArrowRight") next();
  if(e.key === "ArrowLeft") prev();
  if(e.key === "Escape") closeLightbox();
});

/* SWIPE */
let startX = 0;

lightbox.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

lightbox.addEventListener("touchend", e => {
  const endX = e.changedTouches[0].clientX;
  if (startX - endX > 50) next();
  if (endX - startX > 50) prev();
});
